<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login | Marvini Elite Enterprises</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="admin.css" />

<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card {
    background: var(--bg-card, #fff); border-radius: 16px; padding: 2.5rem;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    text-align: center;
  }
  .login-card img { height: 48px; margin-bottom: 1rem; }
  .login-card h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
  .login-card p.sub { color: var(--text-muted, #64748b); font-size: .9rem; margin-bottom: 1.5rem; }
  .form-field { display:flex; flex-direction:column; gap:.4rem; margin-bottom: 1rem; text-align: left; }
  .form-field label { font-size:.85rem; font-weight:600; }
  .form-field input {
    padding:.6rem .8rem; border:1px solid var(--border,#e2e8f0); border-radius:8px; font-size:.9rem; font-family:inherit;
  }
  #loginError { color: #B91C1C; font-size: .85rem; min-height: 1.2em; margin-top: .75rem; }
</style>
</head>
<body>

<div class="login-card">
  <img src="/img/marvini_elite_enterprise_logo2.png" alt="Marvini" onerror="this.style.display='none'"/>
  <h1>Admin Sign In</h1>
  <p class="sub">Marvini Elite Enterprises — Admin Dashboard</p>

  <form id="loginForm">
    <div class="form-field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required autocomplete="username" />
    </div>
    <div class="form-field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center;">
      Sign In
    </button>
    <div id="loginError"></div>
  </form>
</div>

<script type="module">
  import { auth, signInWithEmailAndPassword, onAuthStateChanged } from "../js/firebase-config.js";

  // Already signed in? Skip straight to the dashboard.
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "index.html";
  });

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("loginError");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";
    loginBtn.disabled = true;

    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "index.html";
    } catch (err) {
      errorBox.textContent = "Incorrect email or password.";
      loginBtn.disabled = false;
    }
  });
</script>
</body>
</html>
