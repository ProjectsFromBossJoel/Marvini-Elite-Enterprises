<!-- dashboard/linkedin-posts.html -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LinkedIn Posts | Marvini Admin</title>
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="manifest" href="favicon_io/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/dashboard/admin.css" />

<style>
  /* ---------- LinkedIn Posts page — scoped styles ---------- */
  .lp-shell {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .lp-shell { grid-template-columns: 1fr; }
  }

  .lp-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .lp-head h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lp-head p {
    margin: 4px 0 0;
    color: var(--text-muted, #64748b);
    font-size: 0.9rem;
  }

  /* status pill — reused for connection + generation state */
  .lp-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid var(--border, #e2e8f0);
    background: #fff;
    color: var(--text-muted, #64748b);
  }
  .lp-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .lp-pill.idle { color: #94a3b8; }
  .lp-pill.generating { color: #d97706; }
  .lp-pill.generating .dot { animation: lp-pulse 1s ease-in-out infinite; }
  .lp-pill.ready { color: #059669; }
  .lp-pill.publishing { color: #1a56ff; }
  .lp-pill.live { color: #059669; background: rgba(5,150,105,0.08); border-color: rgba(5,150,105,0.25); }
  .lp-pill.error { color: #dc2626; background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.25); }

  @keyframes lp-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.7); }
  }

  /* ---------- Left panel: prompt ---------- */
  .lp-card {
    background: #fff;
    border: 1px solid var(--border, #e2e8f0);
    border-radius: 14px;
    padding: 20px;
  }
  .lp-card-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted, #64748b);
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lp-card-label::before {
    content: "";
    width: 8px; height: 8px;
    background: var(--royal-blue, #1a56ff);
    border-radius: 2px;
  }

  #lpPrompt {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    border: 1px solid var(--border, #e2e8f0);
    border-radius: 10px;
    padding: 14px;
    font-family: "Poppins", sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
    color: #1e293b;
    background: #f8fafc;
    transition: border-color .15s, box-shadow .15s;
  }
  #lpPrompt:focus {
    outline: none;
    border-color: var(--royal-blue, #1a56ff);
    box-shadow: 0 0 0 3px rgba(26,86,255,0.12);
    background: #fff;
  }

  .lp-quick-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0 16px;
  }
  .lp-chip {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.75rem;
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--border, #e2e8f0);
    background: #f8fafc;
    color: #475569;
    cursor: pointer;
    transition: all .15s;
  }
  .lp-chip:hover { border-color: var(--royal-blue, #1a56ff); color: var(--royal-blue, #1a56ff); }

  .lp-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .lp-btn {
    font-family: "Poppins", sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    padding: 11px 18px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform .1s, opacity .15s, filter .15s;
  }
  .lp-btn:active { transform: scale(0.97); }
  .lp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .lp-btn-primary {
    background: var(--royal-blue, #1a56ff);
    color: #fff;
    flex: 1;
  }
  .lp-btn-primary:hover:not(:disabled) { filter: brightness(1.08); }
  .lp-btn-ghost {
    background: #f1f5f9;
    color: #475569;
  }
  .lp-btn-ghost:hover:not(:disabled) { background: #e2e8f0; }

  /* ---------- Right panel: console / output ---------- */
  .lp-console {
    background: #0b1220;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #1e293b;
    box-shadow: 0 10px 30px -12px rgba(0,0,0,0.35);
  }
  .lp-console-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #111827;
    border-bottom: 1px solid #1e293b;
  }
  .lp-console-dots { display: flex; gap: 6px; }
  .lp-console-dots span {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .lp-console-dots span:nth-child(1) { background: #ef4444; }
  .lp-console-dots span:nth-child(2) { background: #f59e0b; }
  .lp-console-dots span:nth-child(3) { background: #22c55e; }
  .lp-console-title {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    color: #64748b;
    letter-spacing: 0.03em;
  }

  .lp-console-body {
    padding: 18px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
  }

  #lpOutput {
    flex: 1;
    width: 100%;
    min-height: 220px;
    resize: vertical;
    background: transparent;
    border: none;
    outline: none;
    color: #e2e8f0;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.88rem;
    line-height: 1.7;
    caret-color: #22c55e;
  }
  #lpOutput::placeholder { color: #475569; }

  .lp-empty {
    color: #475569;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lp-cursor {
    display: inline-block;
    width: 7px; height: 15px;
    background: #22c55e;
    animation: lp-blink 1s step-end infinite;
  }
  @keyframes lp-blink { 50% { opacity: 0; } }

  .lp-console-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    border-top: 1px solid #1e293b;
    background: #0f1729;
  }
  .lp-meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    color: #64748b;
    display: flex;
    gap: 14px;
  }
  .lp-meta span b { color: #94a3b8; }

  .lp-console-actions { display: flex; gap: 8px; }
  .lp-icon-btn {
    background: #1e293b;
    border: 1px solid #334155;
    color: #cbd5e1;
    width: 34px; height: 34px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  .lp-icon-btn:hover { background: #334155; }
  .lp-icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .lp-publish-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .lp-btn-publish {
    background: #059669;
    color: #fff;
    flex: 1;
  }
  .lp-btn-publish:hover:not(:disabled) { filter: brightness(1.08); }

  .lp-result {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    font-family: "Poppins", sans-serif;
    font-size: 0.88rem;
    display: none;
  }
  .lp-result.show { display: block; }
  .lp-result.success { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.25); color: #047857; }
  .lp-result.error { background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.25); color: #b91c1c; }
  .lp-result a { color: inherit; font-weight: 600; text-decoration: underline; }
</style>
</head>
<body>

<div class="shell">

  <aside class="sidebar">
    <!-- Copy your existing sidebar markup here from index.html, including the new LinkedIn Posts link -->
  </aside>

  <main class="main">

    <div class="lp-head">
      <div>
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/><path d="M10 9h4v2c1-1.5 2.5-2.5 4.5-2.5 3.5 0 5.5 2 5.5 6.5V21h-4v-5.5c0-1.5-.5-2.5-2-2.5s-2 1-2 2.5V21h-4z"/></svg>
          LinkedIn Posts
        </h1>
        <p>Describe what to post. Review the draft. Publish when it's ready.</p>
      </div>
      <span class="lp-pill idle" id="lpConnPill"><span class="dot"></span><span id="lpConnText">checking connection</span></span>
    </div>

    <div class="lp-banner" id="lpExpiryBanner" style="display:none;"></div>

    <div class="lp-shell">

      <!-- LEFT: prompt -->
      <div class="lp-card">
        <p class="lp-card-label">Prompt</p>
        <textarea id="lpPrompt" placeholder="e.g. Create a post about our 2027 conference. Date: 2/3/2027, venue: Accra, time: 12:00 pm – 4:00 pm. Add a brief description."></textarea>

        <div class="lp-quick-row">
          <button type="button" class="lp-chip" data-fill="Announce a new hire on the team. Keep it warm and welcoming.">New hire</button>
          <button type="button" class="lp-chip" data-fill="Promote an upcoming event. Include date, time, and venue.">Event</button>
          <button type="button" class="lp-chip" data-fill="Share a company milestone or achievement worth celebrating.">Milestone</button>
          <button type="button" class="lp-chip" data-fill="Write a thought-leadership post on a trend relevant to our industry.">Thought leadership</button>
        </div>

        <div class="lp-actions">
          <button type="button" class="lp-btn lp-btn-primary" id="lpGenerateBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
            Generate draft
          </button>
        </div>
      </div>

      <!-- RIGHT: console / output -->
      <div class="lp-console">
        <div class="lp-console-bar">
          <div class="lp-console-dots"><span></span><span></span><span></span></div>
          <span class="lp-console-title">groq · openai/gpt-oss-120b</span>
          <span class="lp-pill idle" id="lpGenPill" style="background:transparent;border-color:#334155;color:#64748b;"><span class="dot"></span><span id="lpGenText">idle</span></span>
        </div>

        <div class="lp-console-body">
          <div class="lp-empty" id="lpEmptyState">
            <span>$ awaiting prompt</span><span class="lp-cursor"></span>
          </div>
          <textarea id="lpOutput" placeholder="" style="display:none;"></textarea>
        </div>

        <div class="lp-console-footer">
          <div class="lp-meta">
            <span><b id="lpCharCount">0</b> chars</span>
            <span id="lpTokenNote"></span>
          </div>
          <div class="lp-console-actions">
            <button type="button" class="lp-icon-btn" id="lpCopyBtn" disabled title="Copy">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button type="button" class="lp-icon-btn" id="lpRegenBtn" disabled title="Regenerate">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <div class="lp-publish-row" style="max-width: 50%;">
      <button type="button" class="lp-btn lp-btn-publish" id="lpPublishBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        Post to LinkedIn
      </button>
    </div>
    <div class="lp-result" id="lpResult" style="max-width: 50%;"></div>

  </main>
</div>

<script type="module" src="/js/auth-guard.js"></script>
<script src="/dashboard/admin.js"></script>
<script type="module" src="/js/linkedin-posts-admin.js"></script>
</body>
</html>
