<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found | Marvini Elite Enterprises</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />

<style>
  :root {
    --royal-blue: #1A56FF;
    --emerald: #059669;
    --emerald-light: #10B981;
    --gold: #F59E0B;
    --bg-primary: #080C14;
    --bg-card: #111827;
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(255,255,255,0.08);
    --grad-blue-green: linear-gradient(135deg, #1A56FF 0%, #059669 100%);
    --font-display: 'Montserrat', sans-serif;
    --font-heading: 'Poppins', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    overflow: hidden;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  .stage {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Ambient glow */
  .glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 22% 30%, rgba(26,86,255,0.20) 0%, transparent 62%),
      radial-gradient(ellipse 600px 500px at 78% 72%, rgba(5,150,105,0.16) 0%, transparent 62%);
    pointer-events: none;
  }

  /* Starfield */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(241,245,249,0.5);
    border-radius: 50%;
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.9; }
  }

  /* ── Signature element: a subsidiary node that has drifted out of its orbit ── */
  .orbit-field {
    position: absolute;
    top: 50%; left: 50%;
    width: 640px; height: 640px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .orbit-track {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px dashed rgba(26, 86, 255, 0.22);
  }
  .orbit-track.t2 { inset: 60px; border-color: rgba(5, 150, 105, 0.16); }

  /* node still on its track, circling calmly */
  .orbit-anchor {
    position: absolute; inset: 0;
    animation: spin 26s linear infinite;
  }
  .orbit-anchor .node {
    position: absolute;
    top: -6px; left: 50%;
    width: 12px; height: 12px;
    margin-left: -6px;
    border-radius: 50%;
    background: var(--emerald-light);
    box-shadow: 0 0 14px rgba(16,185,129,0.7);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* the lost node: breaks its orbit, arcs away, fades, resets */
  .stray-wrap {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    animation: strayCycle 7s cubic-bezier(.32,.02,.4,1) infinite;
  }
  .stray-node {
    position: absolute;
    width: 22px; height: 22px;
    margin-left: -11px; margin-top: -11px;
    border-radius: 50%;
    background: var(--grad-blue-green);
    box-shadow: 0 0 24px rgba(26,86,255,0.55), 0 0 46px rgba(5,150,105,0.35);
  }
  .stray-trail {
    position: absolute;
    width: 150px; height: 1px;
    top: -0.5px; left: -150px;
    background: linear-gradient(90deg, transparent, rgba(26,86,255,0.5));
    transform-origin: right center;
  }
  @keyframes strayCycle {
    0%   { transform: translate(0, -230px) scale(1); opacity: 0; }
    8%   { opacity: 1; }
    45%  { transform: translate(210px, -40px) scale(1.15); opacity: 1; }
    75%  { transform: translate(360px, 160px) scale(0.7); opacity: 0.35; }
    100% { transform: translate(430px, 260px) scale(0.3); opacity: 0; }
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 560px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--font-heading);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--emerald-light);
    margin-bottom: 1.75rem;
  }
  .eyebrow::before, .eyebrow::after {
    content: "";
    width: 22px; height: 1px;
    background: rgba(16,185,129,0.4);
  }

  .code {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(5.5rem, 16vw, 9.5rem);
    line-height: 0.9;
    letter-spacing: -0.02em;
    background: var(--grad-blue-green);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 46px rgba(26,86,255,0.28));
    margin-bottom: 0.5rem;
    animation: codeFloat 5s ease-in-out infinite;
  }
  @keyframes codeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(1.35rem, 3vw, 1.75rem);
    color: var(--text-primary);
    margin-bottom: 0.85rem;
  }

  p.lede {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.75;
    max-width: 42ch;
    margin: 0 auto 2.5rem;
  }

  .actions {
    display: flex;
    gap: 0.9rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 0.92rem;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .btn-primary {
    background: var(--grad-blue-green);
    color: #fff;
    box-shadow: 0 4px 22px rgba(26,86,255,0.32);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(26,86,255,0.48);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    border-color: rgba(26,86,255,0.4);
    color: var(--text-primary);
    transform: translateY(-2px);
  }
  .btn svg { width: 17px; height: 17px; flex-shrink: 0; }

  .mark {
    position: absolute;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.55rem;
    font-family: var(--font-heading);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    z-index: 2;
  }
  .mark img { height: 20px; width: auto; opacity: 0.75; }

  :focus-visible { outline: 2px solid var(--royal-blue); outline-offset: 3px; border-radius: 4px; }

  @media (max-width: 560px) {
    .orbit-field { width: 420px; height: 420px; }
    .stray-node { width: 16px; height: 16px; margin-left: -8px; margin-top: -8px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="glow" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="orbit-field" aria-hidden="true">
    <div class="orbit-track"></div>
    <div class="orbit-track t2"></div>
    <div class="orbit-anchor"><div class="node"></div></div>
    <div class="stray-wrap">
      <div class="stray-trail"></div>
      <div class="stray-node"></div>
    </div>
  </div>

  <div class="content">
    <p class="eyebrow">Signal lost</p>
    <div class="code">404</div>
    <h1>This page drifted out of orbit.</h1>
    <p class="lede">The link you followed doesn't lead anywhere on our end — it may have moved, or never existed. Let's get you back to solid ground.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h4a1 1 0 001-1V10"/></svg>
        Back to Home
      </a>
      <a href="mailto:jakunor@hotmail.com" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg>
        Report a broken link
      </a>
    </div>
  </div>

  <div class="mark" aria-hidden="true">
    <img src="img/marvini_elite_enterprise_logo2.png" alt="" onerror="this.style.display='none'" />
    Marvini Elite Enterprises
  </div>
</div>

<script>
  // Scatter a handful of twinkling stars behind the content.
  const starsEl = document.getElementById('stars');
  const STAR_COUNT = 46;
  for (let i = 0; i < STAR_COUNT; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3.5).toFixed(2) + 's';
    s.style.opacity = (0.2 + Math.random() * 0.5).toFixed(2);
    starsEl.appendChild(s);
  }
</script>

</body>
</html>
